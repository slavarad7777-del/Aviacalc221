<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AvisCalc Reset</title>
<style>
body{margin:0;background:#03070a;color:#9dffb0;font-family:monospace;display:grid;place-items:center;min-height:100vh}
.box{width:min(720px,calc(100vw - 24px));padding:22px;border:1px solid rgba(88,216,255,.25);background:#071016;border-radius:12px}
h1{color:#58d8ff;letter-spacing:2px}
a,button{display:inline-block;margin-top:12px;border:1px solid rgba(157,255,176,.4);background:#08160d;color:#9dffb0;padding:12px 14px;border-radius:8px;font-family:monospace;text-decoration:none}
pre{color:#76929b;white-space:pre-wrap;line-height:1.45}
</style>
</head>
<body>
<div class="box">
<h1>AVISCALC RESET</h1>
<pre id="log">Очистка service worker и кэшей...</pre>
<a href="./index.html?fresh=1">Открыть AvisCalc</a>
</div>
<script>
(async function(){
  const log=document.getElementById("log");
  function add(t){log.textContent+="\n"+t}
  try{
    if("serviceWorker" in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      for(const reg of regs){await reg.unregister();add("Service worker removed")}
      if(!regs.length)add("Service worker not found");
    }
  }catch(e){add("SW error: "+e.message)}
  try{
    if(window.caches){
      const keys=await caches.keys();
      for(const key of keys){await caches.delete(key);add("Cache removed: "+key)}
      if(!keys.length)add("Cache not found");
    }
  }catch(e){add("Cache error: "+e.message)}
  add("Готово. Нажми «Открыть AvisCalc».");
})();
</script>
</body>
</html>
