<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Карта Балашов М-38-А</title>
<style>
:root {
  --bg:#03070a;
  --panel:#071016;
  --line:rgba(88,216,255,.24);
  --text:#d8f7ff;
  --muted:#76929b;
  --blue:#58d8ff;
  --green:#9dffb0;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
}
.top{
  position:sticky;
  top:0;
  z-index:10;
  display:grid;
  grid-template-columns:auto 1fr auto auto;
  gap:8px;
  align-items:center;
  padding:calc(env(safe-area-inset-top,0px) + 8px) 10px 8px;
  background:rgba(3,7,10,.94);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(8px);
}
.brand{
  color:var(--blue);
  letter-spacing:2px;
  font-size:12px;
  white-space:nowrap;
}
.title{
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
  color:var(--muted);
  font-size:10px;
}
button,a{
  border:1px solid var(--line);
  background:#081016;
  color:var(--text);
  border-radius:9px;
  padding:8px 9px;
  font:inherit;
  font-size:10px;
  text-decoration:none;
}
button.primary{
  border-color:rgba(157,255,176,.38);
  color:var(--green);
}
.viewer{
  height:calc(100vh - 64px);
  overflow:auto;
  -webkit-overflow-scrolling:touch;
  background:
    radial-gradient(circle at 50% 0%, rgba(88,216,255,.08), transparent 34%),
    #03070a;
}
.inner{
  transform-origin:top left;
  width:100%;
}
img{
  display:block;
  width:100%;
  max-width:none;
  user-select:none;
  -webkit-user-drag:none;
}
.meta{
  padding:10px;
  color:var(--muted);
  font-size:10px;
  line-height:1.45;
  border-top:1px solid var(--line);
}
</style>
</head>
